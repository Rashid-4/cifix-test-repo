name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy
        run: |
          node -e "if (!process.env.API_KEY) { throw new Error('Required environment variable API_KEY is not set'); }"
        env:
          CI: true
          API_KEY: ${{ secrets.API_KEY }}
